spring.application.name=${SPRING_APPLICATION_NAME:backend}
server.port=${SERVER_PORT:8080}

server.servlet.encoding.charset=${SERVER_SERVLET_ENCODING_CHARSET:UTF-8}
server.servlet.encoding.enabled=${SERVER_SERVLET_ENCODING_ENABLED:true}
server.servlet.encoding.force=${SERVER_SERVLET_ENCODING_FORCE:true}

sa-token.token-name=${SA_TOKEN_TOKEN_NAME:satoken}
sa-token.timeout=${SA_TOKEN_TIMEOUT:2592000}
sa-token.active-timeout=${SA_TOKEN_ACTIVE_TIMEOUT:7200}
sa-token.is-concurrent=${SA_TOKEN_IS_CONCURRENT:true}
sa-token.is-share=${SA_TOKEN_IS_SHARE:false}
sa-token.token-style=${SA_TOKEN_TOKEN_STYLE:random-64}
sa-token.is-log=${SA_TOKEN_IS_LOG:true}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}

openai.api-url=${OPENAI_API_URL:}
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1}
